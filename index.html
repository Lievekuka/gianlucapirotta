<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gianluca Kuka Pirotta</title>
  <meta name="description" content="Gianluca Kuka Pirotta — Graphic Designer & Illustrator, Milano">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      min-height: 100vh;
      display: flex;
      font-family: 'Inter', sans-serif;
      color: #356866;
    }

    .inner {
      width: 100%;
      padding: 48px 52px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .top {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-weight: 400;
      font-style: normal;
      font-size: 43px;
      line-height: 1.15;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .role {
      font-weight: 400;
      font-style: italic;
      font-size: 43px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .mobile-only {
      display: none;
    }

    .desktop-only {
      display: inline;
    }

    .links {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 400;
      font-style: normal;
    }

    .links a {
      color: #356866;
      text-decoration: none;
    }

    .links a:hover {
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .inner {
        padding: 40px 32px;
        align-items: center;
        text-align: center;
      }

      .top {
        align-items: center;
      }

      .name {
        font-size: 33px;
        white-space: normal;
      }

      .role {
        font-size: 33px;
        white-space: normal;
      }

      .desktop-only {
        display: none;
      }

      .mobile-only {
        display: block;
      }

      .links {
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="inner">
    <div class="top">
      <div class="name">
        <span class="desktop-only">Gianluca Kuka Pirotta</span>
        <span class="mobile-only">Gianluca Kuka</span>
        <span class="mobile-only">Pirotta</span>
      </div>
      <div class="role">
        <span class="desktop-only">Graphic Designer &amp; Illustrator</span>
        <span class="mobile-only">Graphic Designer</span>
        <span class="mobile-only">&amp; Illustrator</span>
      </div>
    </div>
    <div class="links">
      <a href="https://www.behance.net/lieve" target="_blank" rel="noopener">Works</a>
      <a href="https://www.linkedin.com/in/gianluca-pirotta-9a4a0728/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.instagram.com/lievekuka_design/" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:gianluca.pirotta@gmail.com">Contact</a>
    </div>
  </div>
</body>
</html>
