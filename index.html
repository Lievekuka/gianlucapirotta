<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gianluca Kuka Pirotta</title>
  <meta name="description" content="Gianluca Kuka Pirotta — Graphic Designer & Illustrator, Milano">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F2EDE4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }

    .card {
      background: #356866;
      border-radius: 6px;
      padding: 44px 48px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .card-name {
      font-weight: 700;
      font-size: 13px;
      color: #F2EDE4;
      margin-bottom: 10px;
      white-space: nowrap;
    }

    .card-role {
      font-weight: 400;
      font-size: 13px;
      color: #F2EDE4;
      margin-bottom: 28px;
    }

    .card-divider {
      width: 32px;
      height: 1px;
      background: #F2EDE4;
      margin: 0 auto 28px;
      opacity: 0.3;
    }

    .card-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 0.5px solid rgba(242, 237, 228, 0.25);
      border-radius: 3px;
      padding: 12px 16px;
      color: #F2EDE4;
      font-weight: 400;
      font-size: 13px;
      margin-bottom: 8px;
      text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .card-link:last-of-type {
      margin-bottom: 0;
    }

    .card-link:hover {
      background: rgba(242, 237, 228, 0.08);
      border-color: rgba(242, 237, 228, 0.45);
    }

    .card-link-arrow {
      opacity: 0.35;
      font-size: 14px;
    }

    .card-url {
      font-weight: 400;
      font-size: 11px;
      color: #F2EDE4;
      margin-top: 24px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-name">Gianluca Kuka Pirotta</div>
    <div class="card-role">Graphic Designer &amp; Illustrator</div>
    <div class="card-divider"></div>
    <a class="card-link" href="https://www.behance.net/lieve" target="_blank" rel="noopener">
      Behance <span class="card-link-arrow">↗</span>
    </a>
    <a class="card-link" href="https://www.linkedin.com/in/gianluca-pirotta-9a4a0728/" target="_blank" rel="noopener">
      LinkedIn <span class="card-link-arrow">↗</span>
    </a>
    <a class="card-link" href="https://www.instagram.com/lievekuka_design/" target="_blank" rel="noopener">
      Instagram <span class="card-link-arrow">↗</span>
    </a>
    <div class="card-url">gianlucapirotta.com</div>
  </div>
</body>
</html>
